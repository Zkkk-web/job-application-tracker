{% extends "base.html" %}

{% block title %}Update Application — ApplyTrack{% endblock %}

{% block content %}

  <div class="card" style="max-width:500px; margin: 40px auto;">
    <h2>Update Application Status</h2>
    <p style="color:#888; margin-bottom:20px;">
      {{ app.company }} — {{ app.position }}
    </p>
    <form method="POST">
      <label>Current Status</label>
      <select name="status">
        <option {% if app.status == 'Pending'      %}selected{% endif %}>Pending</option>
        <option {% if app.status == 'Applied'      %}selected{% endif %}>Applied</option>
        <option {% if app.status == 'Written Test' %}selected{% endif %}>Written Test</option>
        <option {% if app.status == 'Interview'    %}selected{% endif %}>Interview</option>
        <option {% if app.status == 'Offer'        %}selected{% endif %}>Offer</option>
        <option {% if app.status == 'Rejected'     %}selected{% endif %}>Rejected</option>
      </select>

      <button type="submit">Update</button>
      <a href="/dashboard" class="btn btn-danger" style="margin-left:10px;">Cancel</a>
    </form>
  </div>

{% endblock %}
